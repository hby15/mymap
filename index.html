<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 문화공간 서비스</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: #fcf8f9; /* 연한 핑크빛 도는 부드러운 배경 */
        }

        /* 화면을 왼쪽과 오른쪽으로 2분할하는 메인 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 (검색창 + 결과 리스트) */
        .sidebar {
            width: 380px; 
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ebd4d8;
            background-color: #ffffff;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
        }

        /* 검색창 영역 */
        .search-box {
            padding: 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #f5e6e8;
            display: flex;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ebd4d8;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: #ffb6c1; /* 포커스 시 파스텔 핑크 */
        }

        .search-box button {
            padding: 10px 18px;
            background-color: #ffb6c1; /* 파스텔톤 핑크 */
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .search-box button:hover {
            background-color: #ffa0b0;
        }

        /* 검색 결과 리스트 영역 (스크롤 가능) */
        .places-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            background-color: #ffffff;
        }

        .places-list li {
            padding: 18px 20px;
            border-bottom: 1px solid #fcf2f4;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .places-list li:hover {
            background-color: #fff0f2;
        }

        .places-list h5 {
            font-size: 16px;
            margin-bottom: 6px;
            color: #4a3b3d;
            font-weight: bold;
        }

        .places-list p {
            font-size: 13px;
            color: #7a6b6d;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .places-list .info-tag {
            display: inline-block;
            font-size: 11px;
            background-color: #fff0f2;
            color: #ff788f;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 4px;
            margin-top: 4px;
        }
