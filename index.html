<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>야간 안전 서비스 - 문화시설 & 주변 주차장 연동</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: #121212; /* 다크 테마 */
            color: #e0e0e0;
        }

        /* 메인 컨테이너 레이아웃 (좌우 2분할) */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 */
        .sidebar {
            width: 380px; 
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2d2d2d;
            background-color: #1e1e1e;
            z-index: 10;
        }

        /* 탭 메뉴 스타일 */
        .tab-menu {
            display: flex;
            background-color: #252525;
            border-bottom: 1px solid #2d2d2d;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: #888;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        /* 활성화된 탭 스타일 */
        .tab-btn.active {
            color: #ffb6c1; 
            border-bottom: 3px solid #ffb6c1;
            background-color: #1e1e1e;
        }

        /* 장소 안내 문구 영역 */
        .info-box {
            padding: 12px;
            background-color: #252525;
            font-size: 12px;
            color: #ffb6c1;
            border-bottom: 1px solid #2d2d2d;
            text-align: center;
            font-weight: bold;
        }
