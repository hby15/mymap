<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카카오맵 장소 검색</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* 왼쪽 검색 영역 */
    .sidebar {
      width: 35%;
      background: #f8f9fa;
      border-right: 1px solid #ddd;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    .search-box button {
      padding: 12px 18px;
      border: none;
      background: #fee500;
      color: #000;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    .search-box button:hover {
      background: #f7d900;
    }

    .result-list {
      flex: 1;
      overflow-y: auto;
    }

    .result-item {
      padding: 15px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
      transition: background 0.2s;
    }

    .result-item:hover {
      background: #eee;
    }

    .result-item h3 {
      font-size: 17px;
      margin-bottom: 5px;
    }

    .result-item p {
      font-size: 14px;
      color: #555;
    }

    /* 오른쪽 지도 영역 */
    #map {
      width: 65%;
      height: 100%;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- 왼쪽 검색 영역 -->
  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="keyword" placeholder="장소를 검색하세요">
      <button onclick="searchPlace()">검색</button>
    </div>
    <div class="result-list" id="resultList"></div>
  </div>

  <!-- 오른쪽 지도 -->
  <div id="map"></div>
</div>

<!-- 카카오맵 SDK -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e48fa8b45a042ee7dc95c081c6692e65&libraries=services&autoload=false"></script>

<script>
  let map;
  let places;
  let markers = [];

  // 지도 초기화
  function initMap(lat, lng) {
    const mapContainer = document.getElementById("map");

    const mapOption = {
      center: new kakao.maps.LatLng(lat, lng),
      level: 5
    };

    map = new kakao.maps.Map(mapContainer, mapOption);

    // 장소 검색 서비스 생성
    places = new kakao.maps.services.Places();

    // 현재 위치 마커 표시
    const currentPosition = new kakao.maps.LatLng(lat, lng);

    new kakao.maps.Marker({
      map: map,
      position: currentPosition
    });
  }

  // 현재 위치 가져오기
  function getCurrentLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function(position) {
          initMap(position.coords.latitude, position.coords.longitude);
        },
        function() {
          // 위치 권한 거부 시 서울 시청 기본값
          initMap(37.5665, 126.9780);
        }
      );
    } else {
      initMap(37.5665, 126.9780);
    }
  }

  // 기존 마커 제거
  function clearMarkers() {
    markers.forEach(marker => marker.setMap(null));
    markers = [];
  }

  // 장소 검색
  function searchPlace() {
    const keyword = document.getElementById("keyword").value.trim();

    if (!keyword) {
      alert("검색어를 입력하세요.");
      return;
    }

    places.keywordSearch(keyword, displayResults);
  }

  // 검색 결과 표시
  function displayResults(data, status) {
    const resultList = document.getElementById("resultList");
    resultList.innerHTML = "";
    clearMarkers();

    if (status !== kakao.maps.services.Status.OK) {
      resultList.innerHTML = "<p>검색 결과가 없습니다.</p>";
      return;
    }

    const bounds = new kakao.maps.LatLngBounds();

    data.forEach(place => {
      const position = new kakao.maps.LatLng(place.y, place.x);

      // 마커 생성
      const marker = new kakao.maps.Marker({
        map: map,
        position: position
      });

      markers.push(marker);
      bounds.extend(position);

      // 리스트 아이템 생성
      const item = document.createElement("div");
      item.className = "result-item";
      item.innerHTML = `
        <h3>${place.place_name}</h3>
        <p>${place.address_name || ""}</p>
      `;

      // 클릭 시 해당 위치로 이동
      item.onclick = () => {
        map.setCenter(position);
      };

      resultList.appendChild(item);
    });

    map.setBounds(bounds);
  }

  // SDK 로드 후 실행
  kakao.maps.load(function () {
    getCurrentLocation();
  });

  // 엔터 검색
  document.getElementById("keyword").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      searchPlace();
    }
  });
</script>

</body>
</html>
