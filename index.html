<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 문화생활 서비스</title>

    <style>
        /* 기본 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 */
        .sidebar {
            width: 360px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            background: #f9f9f9;
        }

        /* 검색창 */
        .search-box {
            padding: 15px;
            display: flex;
            gap: 6px;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .search-box button {
            padding: 10px 14px;
            border: none;
            background: #fee500;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        /* 탭 버튼 */
        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            border: none;
            cursor: pointer;
            background: #f1f1f1;
            font-weight: bold;
        }

        .tab-button.active {
            background: #fee500;
        }

        /* 장소 리스트 */
        .places-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .places-list li {
            padding: 15px;
            border-bottom: 1px solid #eee;
            background: white;
            cursor: pointer;
        }

        .places-list li:hover {
            background: #f7f7f7;
        }

        .places-list h5 {
            margin-bottom: 5px;
            font-size: 16px;
        }

        .places-list p {
            font-size: 13px;
            color: #666;
        }

        /* 지도 */
        .map-area {
            flex: 1;
            height: 100%;
        }

        .info-window {
            padding: 8px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">

        <!-- 검색창 -->
        <div class="search-box">
            <input type="text" id="keyword" placeholder="장소 검색"
                   onkeypress="if(event.keyCode==13) searchKeyword()">
            <button onclick="searchKeyword()">검색</button>
        </div>

        <!-- 카테고리 탭 -->
        <div class="tabs">
            <button class="tab-button active" onclick="searchCategory('CT1', this)">문화 시설</button>
            <button class="tab-button" onclick="searchCategory('PK6', this)">주차</button>
        </div>

        <!-- 검색 결과 -->
        <ul id="placesList" class="places-list"></ul>
    </div>

    <!-- 지도 -->
    <div id="map" class="map-area"></div>
</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4628ecaa202b09762be70a8335b397e7&libraries=services&autoload=false"></script>

<script>
    let map;
    let placeService;
    let markers = [];
    let currentLocationMarker = null;
    let infoWindow;

    kakao.maps.load(function () {
        const mapContainer = document.getElementById('map');

        const defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567);

        map = new kakao.maps.Map(mapContainer, {
            center: defaultPosition,
            level: 5
        });

        placeService = new kakao.maps.services.Places();
        infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 });

        getCurrentLocation();

        // 기본으로 문화시설 검색
        searchCategory('CT1', document.querySelector('.tab-button'));
    });

    /* 현재 위치 가져오기 */
    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function (position) {
                const currentPos = new kakao.maps.LatLng(
                    position.coords.latitude,
                    position.coords.longitude
                );

                map.setCenter(currentPos);

                currentLocationMarker = new kakao.maps.Marker({
                    map: map,
                    position: currentPos
                });

            }, function () {
                alert("위치 권한을 허용해주세요.");
            });
        }
    }

    /* 키워드 검색 */
    function searchKeyword() {
        const keyword = document.getElementById('keyword').value.trim();

        if (!keyword) {
            alert("검색어를 입력해주세요.");
            return;
        }

        placeService.keywordSearch(keyword, searchCallback);
    }

    /* 카테고리 검색 */
    function searchCategory(categoryCode, button) {
        clearMarkers();
        clearActiveTabs();

        button.classList.add('active');

        const center = map.getCenter();

        placeService.categorySearch(categoryCode, searchCallback, {
            location: center,
            radius: 5000
        });
    }

    /* 활성 탭 제거 */
    function clearActiveTabs() {
        const tabs = document.querySelectorAll('.tab-button');
        tabs.forEach(tab => tab.classList.remove('active'));
    }

    /* 검색 콜백 */
    function searchCallback(data, status) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data);
        } else {
            alert("검색 결과가 없습니다.");
        }
    }

    /* 장소 표시 */
    function displayPlaces(places) {
        const listEl = document.getElementById('placesList');
        const bounds = new kakao.maps.LatLngBounds();

        clearMarkers();
        listEl.innerHTML = '';

        places.forEach(place => {
            const position = new kakao.maps.LatLng(place.y, place.x);

            const marker = new kakao.maps.Marker({
                map: map,
                position: position
            });

            markers.push(marker);
            bounds.extend(position);

            /* 마커 클릭 팝업 */
            kakao.maps.event.addListener(marker, 'click', function () {
                showInfo(marker, place);
            });

            /* 리스트 아이템 */
            const item = document.createElement('li');
            item.innerHTML = `
                <h5>${place.place_name}</h5>
                <p>${place.road_address_name || place.address_name}</p>
            `;

            item.onclick = function () {
                map.panTo(position);
                showInfo(marker, place);
            };

            listEl.appendChild(item);
        });

        map.setBounds(bounds);
    }

    /* 상세 팝업 표시 */
    function showInfo(marker, place) {
        const content = `
            <div class="info-window">
                <strong>${place.place_name}</strong><br>
                ${place.road_address_name || place.address_name}<br>
                ${place.phone || '전화번호 없음'}
            </div>
        `;

        infoWindow.setContent(content);
        infoWindow.open(map, marker);
    }

    /* 기존 마커 제거 */
    function clearMarkers() {
        markers.forEach(marker => marker.setMap(null));
        markers = [];
    }
</script>

</body>
</html>
