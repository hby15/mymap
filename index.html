<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>러블리 문화생활 지도</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body, html {
    width: 100%;
    height: 100%;
    font-family: 'Malgun Gothic', sans-serif;
    background: #fff5f8;
}

.container {
    display: flex;
    width: 100%;
    height: 100%;
}

.sidebar {
    width: 370px;
    background: white;
    border-right: 2px solid #ffd6e5;
    display: flex;
    flex-direction: column;
    box-shadow: 3px 0 15px rgba(255,182,193,0.2);
}

.search-box {
    padding: 16px;
    background: #fff0f5;
    display: flex;
    gap: 8px;
}

.search-box input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ffb6c1;
    border-radius: 12px;
}

.search-box button {
    padding: 10px 16px;
    border: none;
    border-radius: 12px;
    background: #ff8fab;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.tabs {
    display: flex;
}

.tab-button {
    flex: 1;
    padding: 14px;
    border: none;
    background: #ffe4ec;
    cursor: pointer;
    font-weight: bold;
}

.tab-button.active {
    background: #ff8fab;
    color: white;
}

.places-list {
    flex: 1;
    overflow-y: auto;
    list-style: none;
}

.places-list li {
    padding: 16px;
    border-bottom: 1px solid #ffe4ec;
    cursor: pointer;
}

.places-list li:hover {
    background: #fff0f5;
}

.map-area {
    flex: 1;
    height: 100%;
}

.popup {
    padding: 10px;
    font-size: 13px;
    color: #c2185b;
    max-width: 250px;
}
</style>
</head>
<body>

<div class="container">

<div class="sidebar">
    <div class="search-box">
        <input type="text" id="keyword" placeholder="문화생활 검색"
               onkeypress="if(event.keyCode==13) searchKeyword()">
        <button onclick="searchKeyword()">검색</button>
    </div>

    <div class="tabs">
        <button class="tab-button active" onclick="searchCategory('CT1', this)">문화시설</button>
        <button class="tab-button" onclick="searchCategory('PK6', this)">주차</button>
    </div>

    <ul id="placesList" class="places-list"></ul>
</div>

<div id="map" class="map-area"></div>

</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4628ecaa202b09762be70a8335b397e7&libraries=services&autoload=false"></script>

<script>
let map;
let placeSearchService;
let markers = [];
let infoWindow;
let currentCategory = 'CT1';

kakao.maps.load(function () {
    const defaultPos = new kakao.maps.LatLng(37.566826, 126.9786567);

    map = new kakao.maps.Map(document.getElementById('map'), {
        center: defaultPos,
        level: 5
    });

    placeSearchService = new kakao.maps.services.Places();
    infoWindow = new kakao.maps.InfoWindow({zIndex: 1});

    getCurrentLocation();
    searchCategory('CT1', document.querySelector('.tab-button'));
});

/* 현재 위치 */
function getCurrentLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            const currentPos = new kakao.maps.LatLng(
                position.coords.latitude,
                position.coords.longitude
            );

            map.setCenter(currentPos);

            new kakao.maps.Marker({
                position: currentPos,
                map: map
            });
        });
    }
}

/* 키워드 검색 */
function searchKeyword() {
    const keyword = document.getElementById('keyword').value.trim();

    if (!keyword) {
        alert("검색어를 입력해주세요.");
        return;
    }

    placeSearchService.keywordSearch(keyword, placesSearchCB);
}

/* 카테고리 검색 */
function searchCategory(categoryCode, button) {
    currentCategory = categoryCode;

    document.querySelectorAll('.tab-button')
        .forEach(tab => tab.classList.remove('active'));

    button.classList.add('active');

    removeMarkers();

    placeSearchService.categorySearch(
        categoryCode,
        placesSearchCB,
        {
            location: map.getCenter(),
            radius: 5000
        }
    );
}

/* 검색 결과 콜백 */
function placesSearchCB(data, status) {
    if (status === kakao.maps.services.Status.OK) {
        displayPlaces(data);
    }
}

/* 장소 표시 */
function displayPlaces(places) {
    const listEl = document.getElementById('placesList');
    const bounds = new kakao.maps.LatLngBounds();

    removeMarkers();
    listEl.innerHTML = '';

    places.forEach(place => {
        const position = new kakao.maps.LatLng(place.y, place.x);

        const markerImage = new kakao.maps.MarkerImage(
            currentCategory === 'PK6'
                ? 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png'
                : 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
            new kakao.maps.Size(24, 35)
        );

        const marker = new kakao.maps.Marker({
            position: position,
            image: markerImage,
            map: map
        });

        markers.push(marker);
        bounds.extend(position);

        const itemEl = document.createElement('li');
        itemEl.innerHTML = `
            <h5>${place.place_name}</h5>
            <p>${place.address_name}</p>
        `;

        itemEl.onclick = function () {
            map.panTo(position);

            if (currentCategory === 'CT1') {
                showNearbyParkingPopup(position, place);
            } else {
                showParkingPopup(position, place);
            }
        };

        listEl.appendChild(itemEl);
    });

    map.setBounds(bounds);
}

/* 문화시설 클릭 시 1km 이내 주차장 팝업 */
function showNearbyParkingPopup(position, place) {
    placeSearchService.categorySearch('PK6', function(data, status) {

        if (status === kakao.maps.services.Status.OK) {

            let parkingList = '';

            data.slice(0, 5).forEach(parking => {
                parkingList += `🚗 ${parking.place_name}<br>`;
            });

            infoWindow.setContent(`
                <div class="popup">
                    <b>${place.place_name}</b><br><br>
                    📍 1km 이내 주차장<br><br>
                    ${parkingList}
                </div>
            `);

            infoWindow.setPosition(position);
            infoWindow.open(map);
        }

    }, {
        location: position,
        radius: 1000
    });
}

/* 주차 팝업 */
function showParkingPopup(position, place) {
    const price = Math.floor(Math.random() * 3000) + 1000;

    infoWindow.setContent(`
        <div class="popup">
            <b>${place.place_name}</b><br>
            예상 이용요금: ${price}원/시간
        </div>
    `);

    infoWindow.setPosition(position);
    infoWindow.open(map);
}

/* 마커 제거 */
function removeMarkers() {
    markers.forEach(marker => marker.setMap(null));
    markers = [];
}
</script>

</body>
</html>
