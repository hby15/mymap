<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카카오맵 장소 검색</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* 왼쪽 검색 영역 */
    .sidebar {
      width: 35%;
      padding: 20px;
      border-right: 1px solid #ddd;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    .search-box button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #fee500;
      cursor: pointer;
      font-weight: bold;
    }

    .result-list {
      overflow-y: auto;
      flex: 1;
    }

    .result-item {
      padding: 14px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }

    .result-item:hover {
      background: #eee;
    }

    #map {
      width: 65%;
      height: 100%;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="keyword" placeholder="장소 검색">
      <button id="searchBtn">검색</button>
    </div>

    <div class="result-list" id="resultList"></div>
  </div>

  <div id="map"></div>
</div>

<!-- 카카오맵 SDK -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e48fa8b45a042ee7dc95c081c6692e65&libraries=services&autoload=false"></script>

<script>
  let map;
  let placesService;
  let markers = [];

  // 지도 생성
  function createMap(lat, lng) {
    const container = document.getElementById("map");

    map = new kakao.maps.Map(container, {
      center: new kakao.maps.LatLng(lat, lng),
      level: 5
    });

    placesService = new kakao.maps.services.Places();

    // 현재 위치 마커
    new kakao.maps.Marker({
      position: new kakao.maps.LatLng(lat, lng),
      map: map
    });
  }

  // 현재 위치 가져오기
  function loadCurrentLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function(position) {
          createMap(
            position.coords.latitude,
            position.coords.longitude
          );
        },
        function() {
          // 실패 시 서울 기본값
          createMap(37.5665, 126.9780);
        }
      );
    } else {
      createMap(37.5665, 126.9780);
    }
  }

  // 마커 제거
  function clearMarkers() {
    markers.forEach(marker => marker.setMap(null));
    markers = [];
  }

  // 장소 검색
  function searchPlace() {
    const keyword = document.getElementById("keyword").value.trim();

    if (!keyword) {
      alert("검색어를 입력하세요.");
      return;
    }

    placesService.keywordSearch(keyword, showResults);
  }

  // 결과 표시
  function showResults(data, status) {
    const resultList = document.getElementById("resultList");
    resultList.innerHTML = "";
    clearMarkers();

    if (status !== kakao.maps.services.Status.OK) {
      resultList.innerHTML = "<p>검색 결과 없음</p>";
      return;
    }

    const bounds = new kakao.maps.LatLngBounds();

    data.forEach(place => {
      const position = new kakao.maps.LatLng(place.y, place.x);

      const marker = new kakao.maps.Marker({
        position: position,
        map: map
      });

      markers.push(marker);
      bounds.extend(position);

      const item = document.createElement("div");
      item.className = "result-item";
      item.innerHTML = `
        <strong>${place.place_name}</strong><br>
        <small>${place.address_name}</small>
      `;

      item.onclick = function() {
        map.setCenter(position);
      };

      resultList.appendChild(item);
    });

    map.setBounds(bounds);
  }

  // SDK 완전 로드 후 실행
  kakao.maps.load(function () {
    loadCurrentLocation();

    document.getElementById("searchBtn")
      .addEventListener("click", searchPlace);

    document.getElementById("keyword")
      .addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
          searchPlace();
        }
      });
  });
</script>

</body>
</html>
