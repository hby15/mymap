<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 문화공간 서비스</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 메인 컨테이너 레이아웃 (좌우 2분할) */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 */
        .sidebar {
            width: 380px; /* 상세 정보 표시를 위해 너비를 조금 넓혔습니다 */
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ccc;
            background-color: #f9f9f9;
            z-index: 10;
        }

        /* 검색창 */
        .search-box {
            padding: 15px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 5px;
        }

        .search-box input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-box button {
            padding: 8px 15px;
            background-color: #ffb6c1; /* 파스텔 핑크 테마에 맞춘 버튼 색상 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
        }

        /* 검색 결과 리스트 (스크롤 가능) */
        .places-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .places-list li {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            background-color: #fff;
            transition: background-color 0.2s;
        }

        .places-list li:hover {
            background-color: #fff0f5; /* 마우스 오버 시 파스텔 핑크빛 */
        }

        .places-list h5 {
            font-size: 16px;
            margin-bottom: 5px;
            color: #333;
        }

        .places-list p {
            font-size: 13px;
            color: #666;
            margin-bottom: 3px;
        }

        /* 리스트 내부의 문화공간 상세 스타일 */
        .culture-info {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #ffd1dc;
            font-size: 12px;
        }
