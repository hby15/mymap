<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 화면을 왼쪽과 오른쪽으로 2분할하는 메인 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 (검색창 + 결과 리스트) */
        .sidebar {
            width: 350px; /* 사이드바 너비 고정 */
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ccc;
            background-color: #f9f9f9;
            z-index: 10;
        }

        /* 검색창 영역 */
        .search-box {
            padding: 15px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 5px;
        }

        .search-box input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-box button {
            padding: 8px 15px;
            background-color: #fee500; /* 카카오 시그니처 노란색 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 검색 결과 리스트 영역 (스크롤 가능) */
        .places-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .places-list li {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            background-color: #fff;
        }

        .places-list li:hover {
            background-color: #f5f5f5;
        }

        .places-list h5 {
            font-size: 16px;
            margin-bottom: 5px;
            color: #333;
        }

        .places-list p {
            font-size: 13px;
            color: #666;
        }

        /* 오른쪽 지도 영역 */
        .map-area {
            flex: 1; /* 남은 화면 전체 차지 */
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소를 검색해보세요" onkeypress="if(event.keyCode==13) searchPlaces()">
                <button onclick="searchPlaces()">검색</button>
            </div>
            <ul id="placesList" class="places-list"></ul>
        </div>

        <div id="map" class="map-area"></div>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4628ecaa202b09762be70a8335b397e7&libraries=services&autoload=false"></script>
    
    <script>
        // 전역 변수 선언
        let map;
        let placeSearchService;
        let markers = [];

        // 지도가 안전하게 완전히 로드된 후 실행되도록 kakao.maps.load 사용 (로딩 오류 방지)
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map');
            
            // 기본 중심 좌표 (위치 권한 거부 시 보여줄 기본값: 서울시청)
            const defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567);
            
            const mapOptions = {
                center: defaultPosition, // 지도 중심 좌표
                level: 5 // 지도 확대 레벨 (요청 조건: 5)
            };

            // 지도 객체 생성
            map = new kakao.maps.Map(mapContainer, mapOptions);
            
            // 장소 검색 서비스 객체 생성
            placeSearchService = new kakao.maps.services.Places();

            // 페이지가 열리면 사용자에게 위치 권한을 요청하고 지도 중심을 이동
            getUserCurrentLocation();
        });

        // 사용자의 현재 위치를 가져오는 함수
        function getUserCurrentLocation() {
            // 브라우저가 GPS/위치 서비스를 지원하는지 확인
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;  // 위도
                    const lon = position.coords.longitude; // 경도
                    
                    const currentPos = new kakao.maps.LatLng(lat, lon);
                    
                    // 지도 중심을 현재 위치로 이동시킴
                    map.setCenter(currentPos);
                    
                    // 현재 위치에 마커 하나 표시하기 (선택 사항)
                    const currentMarker = new kakao.maps.Marker({
                        position: currentPos,
                        map: map
                    });
                    
                }, function(error) {
                    console.error("위치 정보를 가져오는 데 실패했습니다.", error);
                    alert("위치 권한을 허용하지 않아 기본 위치(서울시청)로 지도를 표시합니다.");
                });
            } else {
                alert("이 브라우저에서는 위치 서비스를 지원하지 않습니다.");
            }
        }

        // 키워드 검색을 실행하는 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value.trim();

            if (!keyword) {
                alert('검색어를 입력해주세요!');
                return;
            }

            // 카카오 키워드 검색 서비스 호출
            placeSearchService.keywordSearch(keyword, placesSearchCB);
        }

        // 검색 완료 시 호출되는 콜백 함수
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                // 정상적으로 검색이 완료됐으면 지도 마커와 왼쪽 리스트 갱신
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
            }
        }

        // 검색 결과를 화면(지도 마커 + 리스트)에 표시하는 함수
        function displayPlaces(places) {
            const listEl = document.getElementById('placesList');
            const bounds = new kakao.maps.LatLngBounds();
            
            // 기존에 생성되어 있던 마커와 리스트 내용 지우기
            removeMarkers();
            listEl.innerHTML = '';

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                
                // 지도에 마커 생성 및 표시
                const marker = new kakao.maps.Marker({
                    position: placePosition,
                    map: map
                });
                markers.push(marker);

                // 검색된 장소들의 경계면을 구하기 위해 좌표 추가
                bounds.extend(placePosition);

                // 왼쪽 사이드바에 들어갈 리스트 아이템(HTML) 만들기
                const itemEl = document.createElement('li');
                itemEl.innerHTML = `
                    <h5>${places[i].place_name}</h5>
                    <p>${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</p>
                `;

                // 리스트 아이템을 클릭하면 해당 위치로 지도를 부드럽게 이동시키는 이벤트 추가
                itemEl.onclick = function() {
                    map.panTo(placePosition);
                };

                listEl.appendChild(itemEl);
            }

            // 검색된 장소들이 모두 보이도록 지도 영역(중심 및 확대레벨)을 자동으로 재조정
            map.setBounds(bounds);
        }

        // 지도 위의 이전 마커들을 모두 지우는 함수
        function removeMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }
            markers = [];
        }
    </script>
</body>
</html>
